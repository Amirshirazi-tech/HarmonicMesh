name: harmonicmesh

networks:
  harmonicmeshnet:
    driver: bridge

volumes:
  kafka_data:
  neo4j_data:
  neo4j_logs:
  mlflow_data:

services:

  # ── Kafka (KRaft, SASL/PLAIN) ────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:latest
    hostname: kafka
    container_name: harmonicmesh-kafka
    networks:
      - harmonicmeshnet
    ports:
      - "9192:9092"
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:SASL_PLAINTEXT,SASL_HOST:SASL_PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:29092,SASL_HOST://localhost:9192
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: SASL_PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,SASL_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: ntgJ_c2GSwqDyOPzUlGkKw
      KAFKA_SECURITY_INTER_BROKER_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_SASL_MECHANISM_CONTROLLER_PROTOCOL: PLAIN
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka_server_jaas.conf
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_SUPER_USERS: User:admin;User:harmonicmesh
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
    volumes:
      - ./secrets/kafka_server_jaas.conf:/etc/kafka_server_jaas.conf:ro
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s

  # ── Kafka UI ─────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: harmonicmesh-kafka-ui
    networks:
      - harmonicmeshnet
    ports:
      - "8180:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: harmonicmesh-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="${KAFKA_SASL_USERNAME}"
        password="${KAFKA_SASL_PASSWORD}";
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: "${KAFKA_UI_PASSWORD}"
      DYNAMIC_CONFIG_ENABLED: "true"

  # ── Neo4j Community 5.x ──────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: harmonicmesh-neo4j
    networks:
      - harmonicmeshnet
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Flink JobManager ─────────────────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.19-scala_2.12-java11
    container_name: harmonicmesh-flink-jm
    networks:
      - harmonicmeshnet
    ports:
      - "8181:8081"
    command: jobmanager
    environment:
      # Kafka SASL credentials are read by the CEP job at startup
      # (ThermalVibrationCascadeJob.requireEnv). Substituted from .env at
      # `docker compose up` time, the same way kafka-ui sources them.
      KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD}"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        parallelism.default: 1
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Flink TaskManager ────────────────────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.19-scala_2.12-java11
    container_name: harmonicmesh-flink-tm
    networks:
      - harmonicmeshnet
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      # Same as flink-jobmanager — the TaskManager runs the actual Kafka
      # connector code, so it needs SASL credentials in its environment too.
      KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD}"
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
        parallelism.default: 1
        state.backend: filesystem
        state.checkpoints.dir: file:///tmp/flink-checkpoints

  # ── MLflow Tracking Server ────────────────────────────────────────────────────
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: harmonicmesh-mlflow
    networks:
      - harmonicmeshnet
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI Placeholder ───────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: harmonicmesh-api
    networks:
      - harmonicmeshnet
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
